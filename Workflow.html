<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ctrl+Alt+Heal — How It Works</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Mono', monospace;
  background: radial-gradient(ellipse at center, #0a1628 0%, #050a14 100%);
  color: #fff; overflow: hidden;
  width: 100vw; height: 100vh;
}
.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,210,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
.header { text-align: center; padding: 20px 0 10px 0; z-index: 10; }
.header h1 {
  font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: 30px; letter-spacing: 3px;
  background: linear-gradient(90deg, #00d2ff, #00ff88, #ff64c8, #00d2ff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradient 4s linear infinite;
}
.header p { font-size: 13px; color: rgba(255,255,255,0.55); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
@keyframes gradient { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
svg { width: 100vw; height: calc(100vh - 80px); display: block; }

.step {
  fill: rgba(15, 30, 50, 0.85);
  stroke-width: 2.5;
  rx: 14;
  filter: drop-shadow(0 0 0 transparent);
  transition: filter 0.5s;
}
.step.active {
  filter: drop-shadow(0 0 18px currentColor);
}
.step-num {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 22px;
}
.step-title { fill: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; }
.step-desc { fill: rgba(255,255,255,0.65); font-size: 11px; }
.step-meta { fill: rgba(255,255,255,0.85); font-size: 11.5px; }
.step-aside { fill: rgba(255,255,255,0.45); font-size: 10px; font-style: italic; }
.example-text { font-family: monospace; font-size: 11px; fill: rgba(0,255,136,0.85); }

.arrow {
  stroke: rgba(0,210,255,0.2);
  stroke-width: 2.5;
  fill: none;
  stroke-dasharray: 6 4;
}
.arrow.active {
  stroke: rgba(0,210,255,0.95);
  animation: dash 0.5s linear infinite;
}
@keyframes dash { to { stroke-dashoffset: -10; } }

.outcome { fill: rgba(20, 50, 30, 0.85); stroke: rgba(0,255,136,0.6); stroke-width: 3; rx: 14; }
.outcome-title { fill: #00ff88; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px; }

.legend {
  position: absolute; bottom: 18px; left: 18px;
  background: rgba(10, 22, 40, 0.85);
  border: 1px solid rgba(0,210,255,0.2);
  border-radius: 6px; padding: 10px 14px;
  font-size: 11px; color: rgba(255,255,255,0.6);
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
<div class="header">
  <h1>HOW CTRL+ALT+HEAL WORKS</h1>
  <p>From a simple question to a complete coding gap report — in about two seconds</p>
</div>

<svg id="workflow" viewBox="0 0 1600 760" preserveAspectRatio="xMidYMid meet">
<defs>
  <marker id="warr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M2,1 L8,5 L2,9" fill="rgba(0,210,255,0.95)"/>
  </marker>
</defs>

<!-- ROW 1: STEPS 1-4 -->
<g class="step-group" id="g1">
  <rect class="step" x="60" y="80" width="280" height="155" stroke="#00ff88" style="color:#00ff88;"/>
  <circle cx="100" cy="120" r="22" fill="rgba(0,255,136,0.2)" stroke="#00ff88" stroke-width="2"/>
  <text x="100" y="128" text-anchor="middle" class="step-num" fill="#00ff88">1</text>
  <text x="135" y="115" class="step-title">ASK A QUESTION</text>
  <text x="135" y="135" class="step-desc">A doctor or coder types a request</text>
  <rect x="80" y="155" width="240" height="65" fill="rgba(0,0,0,0.4)" stroke="rgba(0,255,136,0.3)" rx="4"/>
  <text x="92" y="174" class="example-text">"What coding gaps</text>
  <text x="92" y="190" class="example-text">do we have for</text>
  <text x="92" y="206" class="example-text">Margaret Whitmore?"</text>
</g>

<path id="arr1" class="arrow" d="M 340 158 L 405 158" marker-end="url(#warr)"/>

<g class="step-group" id="g2">
  <rect class="step" x="405" y="80" width="280" height="155" stroke="#ffc850" style="color:#ffc850;"/>
  <circle cx="445" cy="120" r="22" fill="rgba(255,200,80,0.2)" stroke="#ffc850" stroke-width="2"/>
  <text x="445" y="128" text-anchor="middle" class="step-num" fill="#ffc850">2</text>
  <text x="480" y="115" class="step-title">AI UNDERSTANDS</text>
  <text x="480" y="135" class="step-desc">The agent reads the question</text>
  <text x="425" y="165" class="step-meta">▸ Figures out the goal</text>
  <text x="425" y="183" class="step-meta">▸ Finds the right patient</text>
  <text x="425" y="201" class="step-meta">▸ Picks the right tool to use</text>
  <text x="425" y="222" class="step-aside">↳ "I need to run gap detection"</text>
</g>

<path id="arr2" class="arrow" d="M 685 158 L 750 158" marker-end="url(#warr)"/>

<g class="step-group" id="g3">
  <rect class="step" x="750" y="80" width="280" height="155" stroke="#b478ff" style="color:#b478ff;"/>
  <circle cx="790" cy="120" r="22" fill="rgba(180,120,255,0.2)" stroke="#b478ff" stroke-width="2"/>
  <text x="790" y="128" text-anchor="middle" class="step-num" fill="#b478ff">3</text>
  <text x="825" y="115" class="step-title">CALLS OUR SYSTEM</text>
  <text x="825" y="135" class="step-desc">Tool request sent to our server</text>
  <text x="770" y="165" class="step-meta">▸ Sends the patient's ID</text>
  <text x="770" y="183" class="step-meta">▸ Includes secure access token</text>
  <text x="770" y="201" class="step-meta">▸ Tells us which records to read</text>
  <text x="770" y="222" class="step-aside">↳ Like a search request</text>
</g>

<path id="arr3" class="arrow" d="M 1030 158 L 1095 158" marker-end="url(#warr)"/>

<g class="step-group" id="g4">
  <rect class="step" x="1095" y="80" width="280" height="155" stroke="#64dcff" style="color:#64dcff;"/>
  <circle cx="1135" cy="120" r="22" fill="rgba(100,220,255,0.2)" stroke="#64dcff" stroke-width="2"/>
  <text x="1135" y="128" text-anchor="middle" class="step-num" fill="#64dcff">4</text>
  <text x="1170" y="115" class="step-title">READS THE CHART</text>
  <text x="1170" y="135" class="step-desc">We pull the patient's data</text>
  <text x="1115" y="165" class="step-meta">▸ Lab results</text>
  <text x="1115" y="183" class="step-meta">▸ Medications</text>
  <text x="1115" y="201" class="step-meta">▸ Doctor's notes</text>
  <text x="1115" y="222" class="step-aside">↳ Conditions, encounters, more</text>
</g>

<path id="arr4" class="arrow" d="M 1235 235 Q 1235 290 1235 320" marker-end="url(#warr)"/>

<!-- ROW 2: STEPS 5-8 (right to left) -->
<g class="step-group" id="g5">
  <rect class="step" x="1095" y="320" width="280" height="170" stroke="#ff64c8" style="color:#ff64c8;"/>
  <circle cx="1135" cy="360" r="22" fill="rgba(255,100,200,0.2)" stroke="#ff64c8" stroke-width="2"/>
  <text x="1135" y="368" text-anchor="middle" class="step-num" fill="#ff64c8">5</text>
  <text x="1170" y="355" class="step-title">LOOKS FOR GAPS</text>
  <text x="1170" y="375" class="step-desc">Four checks happen at once</text>
  <text x="1115" y="405" class="step-meta">▸ Are abnormal labs uncoded?</text>
  <text x="1115" y="422" class="step-meta">▸ Do meds + notes suggest</text>
  <text x="1115" y="436" class="step-meta">   a missed condition?</text>
  <text x="1115" y="453" class="step-meta">▸ What's mentioned in notes?</text>
  <text x="1115" y="473" class="step-meta" style="fill:rgba(255,150,220,1); font-weight:700;">▸ Could codes be more specific?</text>
</g>

<path id="arr5" class="arrow" d="M 1095 405 L 1030 405" marker-end="url(#warr)"/>

<g class="step-group" id="g6">
  <rect class="step" x="750" y="320" width="280" height="170" stroke="#ff9966" style="color:#ff9966;"/>
  <circle cx="790" cy="360" r="22" fill="rgba(255,153,102,0.2)" stroke="#ff9966" stroke-width="2"/>
  <text x="790" y="368" text-anchor="middle" class="step-num" fill="#ff9966">6</text>
  <text x="825" y="355" class="step-title">CHECKS EACH FINDING</text>
  <text x="825" y="375" class="step-desc">Is this gap actually defensible?</text>
  <text x="770" y="405" class="step-meta">Is the condition…</text>
  <text x="770" y="425" class="step-meta">▸ Being monitored with labs?</text>
  <text x="770" y="442" class="step-meta">▸ Discussed in encounters?</text>
  <text x="770" y="459" class="step-meta">▸ Written in the doctor's notes?</text>
  <text x="770" y="476" class="step-meta">▸ Treated with medications?</text>
</g>

<path id="arr6" class="arrow" d="M 750 405 L 685 405" marker-end="url(#warr)"/>

<g class="step-group" id="g7">
  <rect class="step" x="405" y="320" width="280" height="170" stroke="#ffd700" style="color:#ffd700;"/>
  <circle cx="445" cy="360" r="22" fill="rgba(255,215,0,0.2)" stroke="#ffd700" stroke-width="2"/>
  <text x="445" y="368" text-anchor="middle" class="step-num" fill="#ffd700">7</text>
  <text x="480" y="355" class="step-title">CALCULATES THE MONEY</text>
  <text x="480" y="375" class="step-desc">How much revenue is at stake?</text>
  <text x="425" y="405" class="step-meta">▸ Match each gap to its</text>
  <text x="425" y="421" class="step-meta">   risk category</text>
  <text x="425" y="441" class="step-meta">▸ Calculate annual revenue</text>
  <text x="425" y="461" class="step-meta">▸ Sort biggest impact first</text>
  <text x="425" y="479" class="step-aside">↳ Example: $1,826/yr per patient</text>
</g>

<path id="arr7" class="arrow" d="M 405 405 L 340 405" marker-end="url(#warr)"/>

<g class="step-group" id="g8">
  <rect class="step" x="60" y="320" width="280" height="170" stroke="#a78bfa" style="color:#a78bfa;"/>
  <circle cx="100" cy="360" r="22" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="2"/>
  <text x="100" y="368" text-anchor="middle" class="step-num" fill="#a78bfa">8</text>
  <text x="135" y="355" class="step-title">SENDS BACK REPORT</text>
  <text x="135" y="375" class="step-desc">Organized, ready to review</text>
  <text x="80" y="405" class="step-meta">▸ Strong gaps (act now)</text>
  <text x="80" y="423" class="step-meta">▸ Maybe gaps (review)</text>
  <text x="80" y="441" class="step-meta">▸ Evidence behind each one</text>
  <text x="80" y="459" class="step-meta">▸ Total revenue at stake</text>
  <text x="80" y="478" class="step-aside">↳ All in the chat window</text>
</g>

<path id="arr8" class="arrow" d="M 200 490 Q 200 545 200 580" marker-end="url(#warr)"/>

<!-- OUTCOME -->
<g id="outcome">
  <rect class="outcome" x="60" y="580" width="1315" height="140"/>
  <text x="717" y="615" text-anchor="middle" class="outcome-title">✓ THE DOCTOR GETS A COMPLETE CODING REPORT</text>

  <g font-family="Orbitron" text-anchor="middle">
    <text x="220" y="660" fill="#00ff88" font-size="32" font-weight="900">10</text>
    <text x="220" y="685" fill="rgba(255,255,255,0.6)" font-size="11">GAPS FOUND</text>

    <text x="450" y="660" fill="#00ff88" font-size="32" font-weight="900">$6,897</text>
    <text x="450" y="685" fill="rgba(255,255,255,0.6)" font-size="11">PER YEAR</text>

    <text x="700" y="660" fill="#00ff88" font-size="32" font-weight="900">~2 sec</text>
    <text x="700" y="685" fill="rgba(255,255,255,0.6)" font-size="11">TOTAL TIME</text>

    <text x="940" y="660" fill="#00ff88" font-size="32" font-weight="900">All 4</text>
    <text x="940" y="685" fill="rgba(255,255,255,0.6)" font-size="11">CHECKS RAN</text>

    <text x="1200" y="660" fill="#00ff88" font-size="22" font-weight="900">Audit-ready</text>
    <text x="1200" y="685" fill="rgba(255,255,255,0.6)" font-size="11">WITH EVIDENCE</text>
  </g>

  <text x="717" y="708" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="12">
    Including: an upgraded diabetes code worth $1,826/year, newly identified heart failure, and a ready-to-send doctor query
  </text>
</g>

</svg>

<div class="legend">
  <strong style="color:rgba(0,210,255,0.9);">▶ Auto-cycling animation</strong> · Steps light up in order every ~1s
</div>
</div>

<script>
const stepIds = ['g1','g2','g3','g4','g5','g6','g7','g8','outcome'];
const arrowIds = ['arr1','arr2','arr3','arr4','arr5','arr6','arr7','arr8'];

function setActive(idx) {
  stepIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      const rect = el.querySelector('rect');
      if (rect) rect.classList.remove('active');
    }
  });
  arrowIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });

  for (let i = 0; i <= idx; i++) {
    if (stepIds[i]) {
      const el = document.getElementById(stepIds[i]);
      if (el) {
        const rect = el.querySelector('rect');
        if (rect) rect.classList.add('active');
      }
    }
    if (i < arrowIds.length && arrowIds[i]) {
      const el = document.getElementById(arrowIds[i]);
      if (el) el.classList.add('active');
    }
  }
}

let current = 0;
setActive(0);
setInterval(() => {
  current = (current + 1) % (stepIds.length + 2);
  if (current < stepIds.length) {
    setActive(current);
  } else if (current === stepIds.length) {
    setActive(stepIds.length - 1);
  } else {
    setActive(0);
    current = 0;
  }
}, 1100);
</script>
</body>
</html>
