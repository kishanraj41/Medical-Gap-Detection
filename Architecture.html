* { margin: 0; padding: 0; box-sizing: border-box; }

svg { width: 100vw; height: calc(100vh - 70px); display: block; }

.box { fill: rgba(15, 30, 50, 0.85); stroke-width: 2; rx: 12; }

.box.tier { fill: rgba(0,0,0,0.55); stroke-width: 1.5; rx: 6; }
.box.fhir { fill: rgba(20, 40, 50, 0.85); stroke: rgba(100,220,255,0.55); }
.box.feature { fill: rgba(20, 50, 30, 0.55); stroke: rgba(0,255,136,0.5); stroke-width: 1.5; rx: 6; }

.title { fill: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px; }
.subtitle { fill: rgba(255,255,255,0.55); font-size: 10px; }

.label-tier { fill: rgba(255,200,100,0.95); font-size: 12px; font-weight: 700; }
.code-mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: rgba(0,255,136,0.85); }

.conn { fill: none; stroke-dasharray: 5 3; }
.conn.req { stroke: rgba(0,210,255,0.6); stroke-width: 2; animation: dash 1s linear infinite; }
.conn.resp { stroke: rgba(0,255,136,0.6); stroke-width: 2; animation: dash-rev 1s linear infinite; }
.conn.internal { stroke: rgba(255,150,200,0.4); stroke-width: 1.5; animation: dash 1.5s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -8; } }
@keyframes dash-rev { to { stroke-dashoffset: 8; } }

.pulse { animation: pulse 3s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { filter: drop-shadow(0 0 4px currentColor); }
  50% { filter: drop-shadow(0 0 14px currentColor); }

.legend {
  position: absolute; bottom: 10px; right: 14px;
